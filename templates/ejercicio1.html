<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 - Notas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container form-container">
        <h2>Formulario de Notas</h2>
        <form method="POST">
            <div class="form-group">
                <label for="nota1">Nota 1:</label>
                <input type="number" name="nota1" id="nota1" min="10" max="70" required>
            </div>
            <div class="form-group">
                <label for="nota2">Nota 2:</label>
                <input type="number" name="nota2" id="nota2" min="10" max="70" required>
            </div>
            <div class="form-group">
                <label for="nota3">Nota 3:</label>
                <input type="number" name="nota3" id="nota3" min="10" max="70" required>
            </div>
            <div class="form-group">
                <label for="asistencia">Asistencia (%):</label>
                <input type="number" name="asistencia" id="asistencia" min="0" max="100" required>
            </div>
            <button type="submit" class="btn-enviar">Enviar</button>
        </form>

        {% if promedio is not none %}
            <div class="resultados">
                <p>{{ promedio | round(1) }}</p>
                <p>{{ estado }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
