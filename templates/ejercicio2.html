<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2 - Nombres</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container form-container text-center">
        <form method="POST">
            <div class="form-group center-label">
                <label for="nombre1">Nombre 1:</label>
                <input type="text" name="nombre1" id="nombre1" required>
            </div>
            <div class="form-group center-label">
                <label for="nombre2">Nombre 2:</label>
                <input type="text" name="nombre2" id="nombre2" required>
            </div>
            <div class="form-group center-label">
                <label for="nombre3">Nombre 3:</label>
                <input type="text" name="nombre3" id="nombre3" required>
            </div>
            <button type="submit" class="btn-enviar mx-auto">Enviar</button>
        </form>

        {% if nombre_mayor %}
            <div class="resultados mt-3">
                <p>El nombre con mayor cantidad de caracteres es : {{ nombre_mayor }}</p>
                <p>El nombre tiene : {{ caracteres }} caracteres</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
